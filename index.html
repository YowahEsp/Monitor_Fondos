<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Fondos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080c14;
  --surface: #111827;
  --surf2:   #1b2337;
  --border:  #1e2d45;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --accent:  #3b82f6;
  --pos:     #10b981;
  --neg:     #ef4444;
  --pos-bg:  rgba(16,185,129,.12);
  --neg-bg:  rgba(239,68,68,.12);
  --warn:    #f59e0b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
/* ── CABECERA ────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.title-block { flex: 1; min-width: 180px; }
h1 {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.4px;
  color: #fff;
}
h1 em { color: var(--accent); font-style: normal; }
#last-update {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}
#progress {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background .2s, transform .1s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: #2563eb; }
.btn:active:not(:disabled) { transform: scale(.97); }
.btn:disabled { background: var(--muted); cursor: not-allowed; }
.spin { display: inline-block; font-size: 15px; line-height: 1; }
.spin.go { animation: giro 1s linear infinite; }
@keyframes giro { to { transform: rotate(360deg); } }
/* ── CONTENIDO ────────────────────────────── */
main { padding: 24px 28px; max-width: 1180px; margin: 0 auto; }
/* ── TABLA ────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--surf2); }
th {
  padding: 11px 16px;
  text-align: left;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th.r { text-align: right; }
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
.clickable:hover td { background: rgba(255,255,255,.025); cursor: pointer; }
/* ── CELDAS ─────────────────────────────── */
.c-name { font-weight: 500; color: #e2e8f0; max-width: 280px; }
.c-name small { display: block; font-size: 10.5px; color: var(--muted); font-weight: 400; margin-top: 1px; }
.c-isin  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
.c-fecha { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }
.c-nav   { font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-weight: 600; text-align: right; }
.c-pct   { text-align: right; white-space: nowrap; }
.pill {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 5px;
}
.pill.pos { color: var(--pos); background: var(--pos-bg); }
.pill.neg { color: var(--neg); background: var(--neg-bg); }
.pill.neu { color: var(--muted); }
.badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surf2);
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
/* ── SEPARADOR DE CATEGORÍA ──────────────── */
.row-sep td {
  background: var(--surf2);
  color: var(--accent);
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: .09em;
  text-transform: uppercase;
  padding: 9px 16px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.row-sep:hover td { background: var(--surf2); cursor: default; }
/* ── ESTADOS ─────────────────────────────── */
@keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.85} }
.sh { animation: shimmer 1.5s ease-in-out infinite; color: var(--muted); }
@keyframes fadeSlide { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.row-ok td { animation: fadeSlide .3s ease forwards; }
.row-err .c-err { font-size: 10.5px; color: var(--warn); }
.row-block { opacity: .5; }
/* ── NOTAS ────────────────────────────────── */
.notes {
  margin-top: 14px;
  font-size: 11.5px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 0 2px;
  line-height: 1.5;
}
.notes b { color: var(--text); }
/* ── MÓVIL: TABLA → TARJETAS ──────────────── */
@media(max-width:640px) {
  main { padding: 14px; }
  header { padding: 14px; }

  .card { overflow-x: visible; border: none; background: transparent; }
  table { font-size: 13.5px; }
  thead { display: none; }            /* se sustituye por las etiquetas de cada celda */

  table, tbody { display: block; width: 100%; }

  /* cada fila de datos pasa a ser una tarjeta */
  tr.clickable, tr.row-ok, tr.row-err, tr.row-block {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  tr:last-child td { border-bottom: 1px solid var(--border); }

  td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    text-align: right;
  }
  td:last-child { border-bottom: none; }
  td::before {
    content: attr(data-label);
    flex: 0 0 auto;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }

  /* primera celda = cabecera de la tarjeta (nombre del fondo a ancho completo) */
  td.c-name {
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    text-align: left;
    background: var(--surf2);
    max-width: none;
    font-size: 14px;
  }
  td.c-name small { margin-top: 0; }

  .c-nav, .c-pct { text-align: right; }
  .pill { font-size: 12.5px; }

  /* separador de categoría: a ancho completo, sin etiqueta */
  tr.row-sep { display: block; margin: 4px 0 12px; }
  .row-sep td {
    display: block;
    text-align: center;
    border-radius: 9px;
    border: 1px solid var(--border);
  }
  .row-sep td::before { content: none; }
}
</style>
</head>

<script>
// ── FONDOS ────────────────────────────────────────────────────────────────────
const FONDOS = [
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=ES0146309002:EUR" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=ES0119199000:EUR" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=ES0112611001:EUR" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=IE00BH6XSF26:EUR" },
  { url: "https://www.fundsquare.net/security/price?idInstr=6048" },
  { url: "https://www.avl-investmentfonds.de/fonds/details/LU2338974699" },
  { url: "https://www.avl-investmentfonds.de/fonds/details/IE00BK5TW727" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=IE0031574647:EUR" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=LU0147943442:EUR" },
  { url: "https://www.fundsquare.net/security/summary?idInstr=322835" },
  { url: "https://www.fundsquare.net/security/summary?idInstr=5948" },
  { url: "https://www.fundsquare.net/security/price?idInstr=117231" },
  { url: "https://www.avl-investmentfonds.de/fonds/details/LU0757431738" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=IE00BGHQF524:EUR" },
  { url: "https://markets.ft.com/data/funds/tearsheet/summary?s=IE00BDR0JY05:EUR" },
  { url: "https://es.investing.com/funds/azvalor-global-value-pp" },

  // ── De interés ──────────────────────────────────────────────────────────────
  { separador: true, titulo: "De interés" },
  { url: "https://www.fundsquare.net/security/summary?idInstr=268050" },
  { url: "https://www.fundsquare.net/security/summary?idInstr=233106" },
];

// ── PROXIES ───────────────────────────────────────────────────────────────────
// Estado real a jun-2026 (comprobado en consola): de los proxies públicos solo
// corsproxy.io responde con CORS válido, y SOLO desde *.github.io. codetabs da
// HTTP 400; allorigins y cors.x2u.in ya no mandan Access-Control-Allow-Origin.
// → La única vía robusta (y la ÚNICA que funciona desde Codeberg) es un proxy
//   propio. Pega abajo la URL de tu Worker y pasará a ser el proxy prioritario.

// ⬇️⬇️⬇️  PEGA AQUÍ TU PROXY PROPIO (Cloudflare Worker / Deno Deploy).  ⬇️⬇️⬇️
//   Debe terminar de forma que se le pueda añadir la URL destino ya codificada.
//   Ej.: "https://monitor-fondos.TUUSUARIO.workers.dev/?url="
//   Déjalo "" si todavía no lo has desplegado.
const PROXY_PROPIO = "https://monitor-fondos.esperance.workers.dev/?url=";
// ⬆️⬆️⬆️ ─────────────────────────────────────────────────────────────── ⬆️⬆️⬆️

const _PROPIO = PROXY_PROPIO
  ? [{ name:"propio", json:false, url: u => PROXY_PROPIO + encodeURIComponent(u) }]
  : [];
const _CORSPROXY = { name:"corsproxy", json:false, url: u => `https://corsproxy.io/?url=${encodeURIComponent(u)}` };
const _BASE = [   // respaldos públicos: hoy casi todos rotos, se dejan por si reviven
  { name:"codetabs",   json:false, url: u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}` },
  { name:"allorigins", json:false, url: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  { name:"x2u",        json:false, url: u => `https://cors.x2u.in/${u}`                                   },
  { name:"allo-json",  json:true,  url: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}` },
];
const _H = location.hostname;
const _CORSPROXY_OK = /(^|\.)github\.io$/i.test(_H) || _H === "localhost" || _H === "127.0.0.1";
// Orden: proxy propio (si existe) → corsproxy.io (solo en github.io) → respaldos.
const PROXIES = [ ..._PROPIO, ...(_CORSPROXY_OK ? [_CORSPROXY] : []), ..._BASE ];
const HAY_PROPIO = _PROPIO.length > 0;

// Detecta respuestas-basura: muros anti-bot (FT/Cloudflare/Akamai), captchas,
// avisos de rate-limit del proxy, o cuerpos truncados. Devolver esto al parser
// daba el engañoso "estructura cambiada" cuando en realidad era un bloqueo.
function pareceValido(html) {
  if (!html || html.length < 800) return false;          // demasiado corto = interstitial/error
  const cab = html.slice(0, 4000).toLowerCase();
  const trampas = [
    "pardon our interruption", "attention required", "request unsuccessful",
    "are you a human", "captcha", "access denied", "akamai",
    "rate limit", "too many requests", "enable javascript and cookies"
  ];
  if (trampas.some(t => cab.includes(t))) return false;
  return true;
}

// startIdx = proxy por el que empieza este fondo (rotación). Recorre TODOS.
async function fetchHTML(url, startIdx = 0) {
  const n = PROXIES.length;
  let ultimoFallo = "sin respuesta de ningún proxy";
  for (let k = 0; k < n; k++) {
    const px = PROXIES[(startIdx + k) % n];
    try {
      const r = await fetch(px.url(url), { signal: AbortSignal.timeout(15000) });
      if (!r.ok) { ultimoFallo = px.name + " HTTP " + r.status; continue; }
      let html = "";
      if (px.json) {
        const d = await r.json();
        html = (d && d.contents) ? d.contents : "";
      } else {
        html = await r.text();
      }
      if (pareceValido(html)) return html;                // ← contenido real
      ultimoFallo = px.name + " (bloqueo/anti-bot)";      // si no, siguiente proxy
    } catch(_) { ultimoFallo = px.name + " (timeout/red)"; }
  }
  const e = new Error("BLOQUEO"); e.detalle = ultimoFallo; throw e;
}

// ── PARSERS ────────────────────────────────────────────────────────────────────
const ISIN_RE = /\b([A-Z]{2}[A-Z0-9]{9}\d)\b/;

/* Fundsquare. Lee el NAV venga como venga:
   - páginas /security/price Y /security/summary
   - mercado abierto ("Last NAV …") o festivo/cerrado ("Previous NAV …")
   Estrategia: localizar en el texto el primer bloque "fecha precio DIVISA ±%".
   En ambos casos ese primer match es el dato bueno (Last NAV si lo hay, si no
   Previous NAV). Si fallara, se recurre al método antiguo por celdas <td>. */
function parseFundsquare(html, url) {
  const doc = new DOMParser().parseFromString(html, "text/html");

  // OJO: el textContent crudo concatena el contenido de celdas contiguas SIN
  // espacios (…</td><td>… no separa), así que la fecha y el precio llegaban
  // pegados ("22/06/2026289.49") y el patrón no los reconocía. Insertamos un
  // separador al final de cada celda/bloque para que queden sueltos.
  doc.querySelectorAll("td, th, tr, br, p, li, div").forEach(el => el.append(" "));
  const txt = doc.body.textContent.replace(/\u00a0/g, " ").replace(/\s+/g, " ").trim();

  // ISIN: primer código del cuerpo (respaldo: pista de la URL).
  const isinM = txt.match(ISIN_RE);
  const isin  = isinM ? isinM[1] : (isinHint(url) || "?");

  // Nombre: texto tras el ISIN hasta el primer marcador conocido.
  let nombre = isin;
  if (isinM) {
    const after = txt.slice(isinM.index + isinM[1].length);
    const corte = after.search(/Last NAV|Previous NAV|NAV calc|Documents|Overview|Add to|Open glossary/i);
    nombre = after.slice(0, corte > 0 ? corte : 120).replace(/\s+/g, " ").trim() || isin;
  }

  // Método 1 (texto): primer "DD/MM/YYYY precio DIVISA ±cambio %".
  // Espaciado tolerante (\s*) por si alguna celda no quedó separada.
  // El primer match es el dato bueno: Last NAV si lo hay, si no Previous NAV.
  const m = txt.match(/(\d{2}\/\d{2}\/\d{4})\s*([\d.,]+)\s*([A-Z]{3})\s*([-+]?\d+(?:[.,]\d+)?)\s*%/);
  if (m) {
    return { isin, nombre, fecha: m[1],
      nav: m[2].replace(/,/g, ""),            // formato anglosajón: quitar comas de miles
      var_pct: m[4].replace(",", ".") + "%",
      divisa: m[3], fuente: "Fundsquare" };
  }

  // Método 2 (respaldo): estructura antigua con celda "Last NAV".
  const tds = [...doc.querySelectorAll("td")];
  const idx = tds.findIndex(td => /^Last NAV\s*$/i.test(td.textContent.trim()));
  if (idx >= 0 && tds[idx+1] && tds[idx+2]) {
    const fecha   = tds[idx+1].textContent.trim();
    const navCell = tds[idx+2].textContent.replace(/\s+/g, " ").trim();
    const mm = navCell.match(/([\d.,]+)\s*([A-Z]{3})\s*([-+]?[\d.,]+)\s*%/);
    if (mm) return { isin, nombre, fecha,
      nav: mm[1].replace(/,/g, ""),
      var_pct: mm[3].replace(",", ".") + "%",
      divisa: mm[2], fuente: "Fundsquare" };
  }
  return null;
}

/* AVL: "Aktueller Kurs (DD.MM.YYYY) ±chg EUR (±pct %) price EUR" */
function parseAVL(html, url) {
  const doc  = new DOMParser().parseFromString(html, "text/html");
  const title = doc.title || "";
  const parts = title.split("|").map(s => s.trim());
  const ii = parts.findIndex(p => { const m = ISIN_RE.exec(p); return m && m[0] === p; });
  const isin   = ii >= 0 ? parts[ii] : (ISIN_RE.exec(url)||[])[1] || "?";
  const nombre = (ii > 0) ? parts[ii-1] : isin;
  const txt    = doc.body.textContent.replace(/\s+/g, " ");

  // Bloque completo (sección inferior de la página)
  let m = txt.match(
    /Aktueller Kurs\s*\((\d{2}\.\d{2}\.\d{4})\)\s*[-+]?[\d.]+,\d+\s*EUR\s*\(([-+]?[\d.]+,\d+)\s*%\)\s*([\d.]+,\d+)\s*EUR/
  );
  if (m) return { isin, nombre,
    fecha:   m[1].replace(/\./g,"/"),
    nav:     m[3].replace(".","").replace(",","."),
    var_pct: m[2].replace(",",".")+"%", divisa:"EUR", fuente:"AVL" };

  // Plan B: precio aparece ANTES de "Aktueller Kurs" (sección superior)
  const md = txt.match(/Aktueller Kurs\s*\((\d{2}\.\d{2}\.\d{4})\)/);
  const mp = txt.match(/([\d.]+,\d+)\s*EUR\s*Aktueller Kurs/);
  const mc = txt.match(/\(([-+]?\d+,\d+)\s*%\)/);
  if (!md || !mp) return null;
  return { isin, nombre,
    fecha:   md[1].replace(/\./g,"/"),
    nav:     mp[1].replace(".","").replace(",","."),
    var_pct: mc ? mc[1].replace(",",".")+"%":"N/D", divisa:"EUR", fuente:"AVL" };
}

/* Financial Times: pares label/value */
function parseFT(html, url) {
  const doc  = new DOMParser().parseFromString(html, "text/html");
  const im   = url.match(/[?&]s=([A-Za-z0-9]+):/i);
  const isin = im ? im[1].toUpperCase() : "?";
  const h1   = doc.querySelector("h1");
  const nombre = h1 ? h1.textContent.replace(/\s+/g," ").trim() : isin;

  const pares = {};
  doc.querySelectorAll("li, .mod-ui-data-list__item").forEach(el => {
    const lab = el.querySelector(".mod-ui-data-list__label");
    const val = el.querySelector(".mod-ui-data-list__value");
    if (lab && val) pares[lab.textContent.trim().toLowerCase()] = val.textContent.trim();
  });

  const navK = Object.keys(pares).find(k => k.includes("price"));
  const chgK = Object.keys(pares).find(k => k.includes("today's change") || k.includes("day change"));
  const nav  = navK ? pares[navK].replace(",","") : null;
  if (!nav) return null;

  const vm = chgK ? (pares[chgK]||"").match(/([-+]?\d+(?:[.,]\d+)?)\s*%/) : null;
  const var_pct = vm ? vm[1]+"%":"N/D";

  const txt    = doc.body.textContent;
  const fechaM = txt.match(/as of\s+([A-Za-z]{3}\s+\d{1,2}\s+\d{4})/i);
  const fecha  = fechaM ? ftFecha(fechaM[1]) : "N/D";
  return { isin, nombre, fecha, nav, var_pct, divisa:"EUR", fuente:"FT" };
}

const MES = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",
             Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
function ftFecha(s) {
  const m = s.match(/([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/);
  return m ? `${m[2].padStart(2,"0")}/${MES[m[1]]||"??"}/${m[3]}` : s;
}

/* Investing.com. El nombre y el código salen de las metaetiquetas; el precio,
   la variación diaria y la fecha del bloque de cotización del cuerpo
   ("264,880 +1,531 (+0,58%)  ·  22/06 - Info retrasada. Valores en EUR").
   El patrón del % se ancla al precio de la meta para no confundirlo con otros
   números de la página. Investing da la fecha como DD/MM; le añadimos el año. */
function parseInvesting(html, url) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const meta = n => (doc.querySelector(`meta[property="${n}"]`) ||
                     doc.querySelector(`meta[name="${n}"]`) || {}).content || "";

  const title = meta("og:title") || doc.title || "";
  const codM  = title.match(/\(([A-Z0-9]{6,})\)/);
  const isin  = codM ? codM[1] : (isinHint(url) || "?");
  const nombre = title
    .replace(/^Fondo\s+/i, "")
    .replace(/\s*\([^)]*\)\s*/, " ")
    .replace(/\s*-\s*Investing\.com.*$/i, "")
    .replace(/\s+/g, " ").trim() || isin;

  const desc  = meta("og:description") || meta("description") || "";
  const pMeta = (desc.match(/[úu]ltimo precio:?\s*([\d.,]+)/i) || [])[1] || null;

  const txt = doc.body.textContent.replace(/\u00a0/g, " ").replace(/\s+/g, " ");

  // Precio: el de la meta (fiable); si no, el del bloque de cotización.
  let nav = pMeta;
  if (!nav) nav = (txt.match(/([\d][\d.,]*)\s*[-+][\d.,]+\s*\(\s*[-+]/) || [])[1];
  if (!nav) return null;

  // Variación %: "<precio> ±cambio (±X %)", anclado al precio para evitar líos.
  let var_pct = "N/D";
  const reCot = pMeta
    ? new RegExp(pMeta.replace(/\./g, "\\.").replace(/,/g, "[.,]") + "\\s*[-+][\\d.,]+\\s*\\(\\s*([-+][\\d.,]+)\\s*%")
    : /[\d][\d.,]*\s*[-+][\d.,]+\s*\(\s*([-+][\d.,]+)\s*%/;
  const cm = txt.match(reCot);
  if (cm) var_pct = cm[1].replace(",", ".") + "%";

  // Fecha "22/06 - Info retrasada" (DD/MM → añadimos el año en curso).
  let fecha = "N/D";
  const fM = txt.match(/(\d{2}\/\d{2})\s*-\s*Info/i) || txt.match(/(\d{2}\/\d{2}\/\d{4})/);
  if (fM) fecha = fM[1].length === 5 ? `${fM[1]}/${new Date().getFullYear()}` : fM[1];

  nav = nav.replace(/\./g, "").replace(",", ".");   // español → punto decimal
  return { isin, nombre, fecha, nav, var_pct, divisa: "EUR", fuente: "Investing" };
}

function getParser(url) {
  if (url.includes("markets.ft.com"))        return parseFT;
  if (url.includes("fundsquare.net"))        return parseFundsquare;
  if (url.includes("avl-investmentfonds.de"))return parseAVL;
  if (url.includes("investing.com"))         return parseInvesting;
  return null;
}

// ── FORMATO ────────────────────────────────────────────────────────────────────
function fmtNav(nav, div) {
  const n = parseFloat(nav);
  if (isNaN(n)) return nav;
  return n.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:4})
    + " " + (div||"EUR");
}
function fmtPct(pct) {
  if (!pct || pct==="N/D")
    return '<span class="pill neu">—</span>';
  const m = pct.match(/([-+]?)([\d.]+)%/);
  if (!m) return `<span class="pill neu">${esc(pct)}</span>`;
  const n = parseFloat(m[1]+m[2]);
  const cls = n>0?"pos":n<0?"neg":"neu";
  const lbl = (n>0?"+":"") +
    n.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" %";
  return `<span class="pill ${cls}">${lbl}</span>`;
}

// ── UTILIDADES ─────────────────────────────────────────────────────────────────
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function isinHint(url) {
  const m1 = url.match(/[?&]s=([A-Za-z0-9]+):/i); if (m1) return m1[1].toUpperCase();
  const m2 = url.match(/idInstr=(\d+)/);           if (m2) return "id:"+m2[1];
  const m3 = url.match(/details\/([A-Za-z0-9]+)/); if (m3) return m3[1].toUpperCase();
  return "—";
}
function fuenteLabel(url) {
  if (url.includes("markets.ft.com"))         return "FT";
  if (url.includes("fundsquare.net"))         return "Fundsquare";
  if (url.includes("avl-investmentfonds.de")) return "AVL";
  if (url.includes("investing.com"))          return "Investing";
  return "—";
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderRows() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  FONDOS.forEach((f, i) => {
    const tr = document.createElement("tr");
    tr.id = "row-"+i;

    if (f.separador) {
      tr.className = "row-sep";
      tr.innerHTML = `<td colspan="6">${esc(f.titulo)}</td>`;
      tbody.appendChild(tr);
      return;
    }

    if (f.bloqueado) {
      tr.className = "row-block";
      tr.innerHTML = `
        <td class="c-name" data-label="Fondo">${esc(f.nombre||"—")}<small>${esc(f.nota||"")}</small></td>
        <td class="c-isin" data-label="ISIN">—</td>
        <td class="c-fecha" data-label="Fecha NAV">—</td>
        <td class="c-nav" data-label="NAV">—</td>
        <td class="c-pct" data-label="Var. %">—</td>
        <td data-label="Fuente"><span class="badge">Bloomberg</span></td>`;
    } else {
      const hint = isinHint(f.url);
      const fLabel = fuenteLabel(f.url);
      tr.className = "clickable";
      tr.title = f.url;
      tr.onclick = () => window.open(f.url, "_blank");
      tr.innerHTML = `
        <td class="c-name" data-label="Fondo"><span class="sh">${esc(hint)}</span></td>
        <td class="c-isin" data-label="ISIN"><span class="sh">—</span></td>
        <td class="c-fecha" data-label="Fecha NAV"><span class="sh">—</span></td>
        <td class="c-nav" data-label="NAV"><span class="sh">—</span></td>
        <td class="c-pct" data-label="Var. %"><span class="pill neu sh">—</span></td>
        <td data-label="Fuente"><span class="badge">${fLabel}</span></td>`;
    }
    tbody.appendChild(tr);
  });
}

function rowOK(i, r) {
  const tr = document.getElementById("row-"+i);
  if (!tr) return;
  tr.className = "row-ok clickable";
  tr.title = FONDOS[i].url;
  tr.onclick = () => window.open(FONDOS[i].url, "_blank");
  tr.innerHTML = `
    <td class="c-name" data-label="Fondo">${esc(r.nombre)}</td>
    <td class="c-isin" data-label="ISIN">${esc(r.isin)}</td>
    <td class="c-fecha" data-label="Fecha NAV">${esc(r.fecha)}</td>
    <td class="c-nav" data-label="NAV">${esc(fmtNav(r.nav, r.divisa))}</td>
    <td class="c-pct" data-label="Var. %">${fmtPct(r.var_pct)}</td>
    <td data-label="Fuente"><span class="badge">${esc(r.fuente)}</span></td>`;
}

function rowErr(i, msg) {
  const tr = document.getElementById("row-"+i);
  if (!tr) return;
  const hint = isinHint(FONDOS[i].url);
  tr.className = "row-err";
  tr.title = FONDOS[i].url;
  tr.onclick = () => window.open(FONDOS[i].url, "_blank");
  tr.innerHTML = `
    <td class="c-name" data-label="Fondo" style="color:var(--muted)">${esc(hint)}</td>
    <td class="c-isin" data-label="ISIN">—</td>
    <td class="c-fecha" data-label="Fecha NAV">—</td>
    <td class="c-nav" data-label="NAV">—</td>
    <td class="c-pct" data-label="Var. %">—</td>
    <td data-label="Fuente"><span class="badge">${fuenteLabel(FONDOS[i].url)}</span>
        <span class="c-err"> ${esc(msg)}</span></td>`;
}

// ── PROGRESO ───────────────────────────────────────────────────────────────────
let total = 0, done = 0;
function setProgress(d, t) {
  document.getElementById("progress").textContent = d+"/"+t+" fondos";
}
function setBusy(b) {
  document.getElementById("btnRef").disabled = b;
  document.getElementById("ico").className = "spin" + (b?" go":"");
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
async function iniciar() {
  setBusy(true);
  done = 0;
  total = FONDOS.filter(f => !f.bloqueado && !f.separador).length;
  setProgress(0, total);
  document.getElementById("last-update").textContent = "Cargando…";
  document.getElementById("notes").innerHTML = "";
  renderRows();

  // Consultas en paralelo PERO con freno: 3 workers, arranque escalonado y un
  // pequeño retardo con jitter entre peticiones. Los proxies gratuitos tumban
  // las ráfagas (429/“rate limit”); espaciarlas un poco evita justamente el
  // patrón “unos cargan y otros no”. Cada fondo además rota el proxy inicial.
  const pend = FONDOS.map((f, i) => ({ f, i })).filter(x => !x.f.bloqueado && !x.f.separador);
  let cursor = 0;
  async function worker(wid) {
    await sleep(wid * 250);                               // arranque escalonado
    while (cursor < pend.length) {
      const { f, i } = pend[cursor++];
      await sleep(150 + Math.random() * 250);             // throttle + jitter
      try {
        // Con proxy propio: empezar siempre por él (índice 0). Sin él: rotar.
        const start  = HAY_PROPIO ? 0 : (i % PROXIES.length);
        const html   = await fetchHTML(f.url, start);
        const parser = getParser(f.url);
        const result = parser ? parser(html, f.url) : null;
        result ? rowOK(i, result)
               : rowErr(i, "Sin datos — ¿anti-bot o estructura cambiada?");
      } catch(e) {
        rowErr(i, e.message === "BLOQUEO"
          ? "Proxies saturados/anti-bot — reintenta · " + (e.detalle || "")
          : e.message);
      }
      done++;
      setProgress(done, total);
    }
  }
  await Promise.all(Array.from({ length: 3 }, (_, w) => worker(w)));

  document.getElementById("last-update").textContent =
    "Última actualización: " + new Date().toLocaleString("es-ES");
  setBusy(false);

  const aviso = HAY_PROPIO
    ? `<span>✅ <b>Proxy propio activo.</b> Funciona desde cualquier host (Codeberg incluido) y sin rate-limits de terceros.</span>`
    : `<span>🛠️ <b>Sin proxy propio.</b> Los proxies públicos gratuitos están casi todos caídos (codetabs 400; allorigins y x2u sin CORS). Hoy solo corsproxy.io funciona, y <b>solo desde github.io</b>. Para que esto vaya fiable —y para que funcione en Codeberg— despliega tu Worker y pega su URL en <code>PROXY_PROPIO</code>.</span>`;
  document.getElementById("notes").innerHTML = aviso + `
    <span>⚠ <b>Financial Times:</b> anti-bot agresivo. Un proxy propio con User-Agent de navegador suele saltárselo; si Cloudflare te lo bloquea, prueba Deno Deploy.</span>
    <span>🔎 <b>Fundsquare:</b> lee las fichas /security/summary y /security/price, en día hábil o festivo (toma "Previous NAV" si el mercado está cerrado).</span>
    <span>📈 <b>Investing.com (azValor Global Value PP):</b> sustituye al antiguo Bloomberg. Lee precio, variación y fecha del bloque de cotización.</span>
    <span>💡 Haz clic en cualquier fila para abrir la página original del fondo.</span>`;
}

// Auto-cargar al abrir
window.addEventListener("load", iniciar);
</script>
